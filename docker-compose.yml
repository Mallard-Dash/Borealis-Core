services:

  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: chad
      MARIADB_USER: vincent
      MARIADB_PASSWORD: chad
      MARIADB_DATABASE: healthlogger

    volumes:
      - db_data:/var/lib/mysql
      - ./database_storage.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 4458:3306
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 2s
      timeout: 2s
      retries: 30

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: vincent
      DB_PASSWORD: chad
      DB_NAME: healthlogger
    stdin_open: true
    tty: true
    volumes:
      - /home/vincent/.aws:/root/.aws

volumes:
  db_data:
