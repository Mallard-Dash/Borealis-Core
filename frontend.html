<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borealis Core — Health Logger</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green-300:#74c69d;--green-500:#40916c;--green-700:#1b4332;--teal-400:#52b788;--teal-600:#2d6a4f;--blue-300:#90e0ef;--blue-500:#0077b6;--violet-400:#9b72cf;--violet-600:#6a0dad;--surface-0:#050e18;--surface-1:#0a1a28;--surface-2:#0d2137;--text-bright:#e8f4f8;--text-mid:#9ecfd8;--text-dim:#5a8a96;--border:rgba(70,160,180,0.18);--border-glow:rgba(100,220,200,0.3);--radius-sm:8px;--radius-md:14px;--radius-lg:22px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Raleway',sans-serif;background:var(--surface-0);color:var(--text-bright);min-height:100vh;overflow-x:hidden;}
#aurora-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 10% 8%,rgba(255,255,255,.75) 0%,transparent 100%),radial-gradient(1px 1px at 25% 4%,rgba(255,255,255,.55) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 12%,rgba(255,255,255,.85) 0%,transparent 100%),radial-gradient(1px 1px at 55% 3%,rgba(255,255,255,.45) 0%,transparent 100%),radial-gradient(1px 1px at 70% 9%,rgba(255,255,255,.65) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 85% 5%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 33% 7%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 91% 2%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 3% 6%,rgba(255,255,255,.65) 0%,transparent 100%);}

/* ── LOGIN SCREEN ── */
#login-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;}
#login-screen.hidden{display:none;}
.login-card{background:rgba(10,26,40,.92);border:1px solid var(--border-glow);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:360px;max-width:100%;position:relative;backdrop-filter:blur(24px);}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(64,145,108,.6),transparent);}
.login-rune{font-size:36px;text-align:center;margin-bottom:.5rem;filter:drop-shadow(0 0 16px rgba(100,220,200,.7));}
.login-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;text-align:center;color:var(--text-bright);margin-bottom:.25rem;text-transform:uppercase;}
.login-sub{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-align:center;margin-bottom:2rem;text-transform:uppercase;}
.login-tabs{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:1.5rem;}
.login-tab{flex:1;padding:8px;font-size:11px;font-family:'Raleway',sans-serif;font-weight:600;letter-spacing:1px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.login-tab.active{background:rgba(64,145,108,.25);color:var(--green-300);}
.login-err{font-size:11px;color:#f87171;text-align:center;min-height:16px;margin-bottom:.5rem;}
.login-ok{font-size:11px;color:var(--green-300);text-align:center;min-height:16px;margin-bottom:.5rem;}

/* ── LAYOUT ── */
.layout{position:relative;z-index:1;display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{grid-row:1/-1;background:rgba(5,18,32,.88);border-right:1px solid var(--border);backdrop-filter:blur(20px);padding:1.5rem 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo-block{padding:0 1.25rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.logo-rune{font-size:26px;margin-bottom:4px;filter:drop-shadow(0 0 12px rgba(100,220,200,.6));}
.logo-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:3px;color:var(--text-bright);text-transform:uppercase;}
.logo-sub{font-size:9px;font-weight:300;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-top:2px;}
.nav-section{padding:0 .75rem;flex:1;}
.nav-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);padding:0 .5rem;margin-bottom:4px;margin-top:16px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-mid);font-size:12px;letter-spacing:.4px;transition:all .2s;border:1px solid transparent;position:relative;overflow:hidden;}
.nav-item:hover{background:rgba(100,220,200,.06);color:var(--text-bright);border-color:rgba(100,220,200,.15);}
.nav-item.active{background:rgba(64,145,108,.18);color:var(--green-300);border-color:rgba(64,145,108,.4);}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:linear-gradient(180deg,var(--green-300),var(--teal-400));border-radius:2px;}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.8;}
.nav-item.active .nav-icon{opacity:1;}
.sidebar-footer{padding:.875rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--green-500),var(--blue-500));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;border:1px solid rgba(100,220,200,.3);flex-shrink:0;}
.user-name{font-size:12px;font-weight:500;color:var(--text-bright);}
.user-status{font-size:10px;color:var(--green-300);letter-spacing:.5px;}

/* ── TOPBAR ── */
.topbar{background:rgba(5,14,24,.78);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.75rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.page-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--text-bright);font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-badge{font-size:10px;color:var(--text-dim);letter-spacing:1px;border:1px solid var(--border);padding:4px 11px;border-radius:20px;background:rgba(255,255,255,.03);}
.log-btn{background:linear-gradient(135deg,var(--green-500),var(--teal-600));color:#fff;border:none;padding:7px 16px;border-radius:18px;font-size:11px;font-family:'Raleway',sans-serif;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 0 16px rgba(64,145,108,.3);}
.log-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(64,145,108,.45);}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03);}
.lang-btn{padding:5px 12px;font-size:10px;font-family:'Raleway',sans-serif;font-weight:600;letter-spacing:1.5px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.lang-btn.active{background:rgba(64,145,108,.25);color:var(--green-300);}
.logout-btn{font-size:10px;color:var(--text-dim);border:1px solid var(--border);padding:4px 11px;border-radius:20px;background:transparent;cursor:pointer;font-family:'Raleway',sans-serif;letter-spacing:.5px;transition:all .2s;}
.logout-btn:hover{color:#f87171;border-color:rgba(248,113,113,.4);}

/* ── MAIN ── */
.main{padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.5rem;}
.glass-card{background:rgba(10,26,40,.72);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(16px);position:relative;overflow:hidden;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(100,220,200,.22),transparent);}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem;}
.stat-card{background:rgba(10,26,40,.78);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.1rem 1.25rem;position:relative;overflow:hidden;transition:all .25s;}
.stat-card:hover{border-color:var(--border-glow);transform:translateY(-2px);}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent,linear-gradient(90deg,var(--green-500),var(--teal-400)));opacity:.6;}
.stat-icon{font-size:16px;margin-bottom:8px;display:block;}
.stat-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.stat-value{font-size:24px;font-weight:300;color:var(--text-bright);line-height:1;letter-spacing:-.5px;}
.stat-unit{font-size:11px;color:var(--text-mid);margin-left:3px;}
.stat-sub{font-size:10px;margin-top:5px;color:var(--text-dim);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;}
.grid-3-1{display:grid;grid-template-columns:1.7fr 1fr;gap:1.1rem;}
.card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-mid);font-weight:400;}
.card-badge{font-size:9px;padding:3px 9px;border-radius:12px;background:rgba(64,145,108,.2);color:var(--green-300);border:1px solid rgba(64,145,108,.35);letter-spacing:1px;white-space:nowrap;}
.card-body{padding:1.25rem;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:150px;padding:0 1.25rem .875rem;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--green-300),var(--teal-600));opacity:.82;min-height:4px;animation:barGrow .8s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom;}to{transform:scaleY(1);transform-origin:bottom;}}
.bar-label{font-size:9px;color:var(--text-dim);}
.bar-val{font-size:9px;color:var(--text-mid);}
.mood-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.mood-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.empty-state{padding:2rem;text-align:center;font-size:12px;color:var(--text-dim);font-style:italic;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(100,220,200,.2);border-top-color:var(--green-300);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.diary-entry{padding:12px 1.25rem;border-bottom:1px solid rgba(70,160,180,.08);transition:background .15s;cursor:default;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.diary-entry:hover{background:rgba(100,220,200,.03);}
.diary-entry:last-child{border-bottom:none;}
.diary-entry-main{flex:1;}
.diary-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.diary-date{font-size:9px;letter-spacing:2px;color:var(--text-dim);}
.diary-tag{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(100,220,200,.1);color:var(--teal-400);border:1px solid rgba(100,220,200,.2);letter-spacing:1px;text-transform:uppercase;}
.diary-text{font-size:12px;color:var(--text-mid);line-height:1.6;font-weight:300;}
.del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 4px;line-height:1;opacity:.5;transition:opacity .2s;}
.del-btn:hover{opacity:1;color:#f87171;}
.entry-list{display:flex;flex-direction:column;}
.entry-row{display:flex;align-items:center;padding:10px 1.25rem;border-bottom:1px solid rgba(70,160,180,.08);gap:10px;transition:background .15s;cursor:default;}
.entry-row:last-child{border-bottom:none;}
.entry-row:hover{background:rgba(100,220,200,.04);}
.entry-date{font-size:10px;color:var(--text-dim);min-width:84px;letter-spacing:.4px;}
.entry-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.entry-metrics{display:flex;gap:14px;flex:1;flex-wrap:wrap;}
.entry-metric{display:flex;flex-direction:column;}
.entry-metric-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.entry-metric-val{font-size:12px;font-weight:500;color:var(--text-bright);}
.wiki-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:1.25rem;}
.wiki-chip{background:rgba(10,26,40,.8);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;transition:all .2s;position:relative;}
.wiki-chip:hover{border-color:var(--border-glow);}
.wiki-cat{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal-400);margin-bottom:4px;}
.wiki-content{font-size:11px;color:var(--text-mid);font-weight:300;line-height:1.5;}
.greeting-card{background:rgba(10,26,40,.75);border:1px solid rgba(64,145,108,.3);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:14px;}
.greeting-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(64,145,108,.5),transparent);}
.greeting-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--green-700),#03045e);border:2px solid rgba(64,145,108,.4);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px rgba(64,145,108,.25);}
.greeting-body{flex:1;}
.greeting-from{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green-300);margin-bottom:5px;}
.greeting-text{font-size:13px;color:var(--text-bright);line-height:1.6;font-weight:300;}
.greeting-today{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
.today-pill{font-size:10px;padding:3px 10px;border-radius:12px;background:rgba(100,220,200,.08);color:var(--teal-400);border:1px solid rgba(100,220,200,.2);}
.ai-messages{padding:1.25rem;display:flex;flex-direction:column;gap:12px;min-height:220px;max-height:420px;overflow-y:auto;}
.ai-msg{display:flex;gap:9px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.ai-msg.user{flex-direction:row-reverse;}
.msg-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.msg-avatar.ai{background:linear-gradient(135deg,var(--green-700),#03045e);border:1px solid var(--border-glow);font-size:13px;}
.msg-avatar.user{background:linear-gradient(135deg,var(--violet-600),var(--blue-500));color:#fff;}
.msg-bubble{max-width:78%;padding:9px 13px;border-radius:13px;font-size:12px;line-height:1.6;}
.ai-msg.ai .msg-bubble{background:rgba(64,145,108,.1);border:1px solid rgba(64,145,108,.25);color:var(--text-bright);border-bottom-left-radius:3px;}
.ai-msg.user .msg-bubble{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:var(--text-bright);border-bottom-right-radius:3px;}
.ai-input-row{padding:.875rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:9px;align-items:center;}
.ai-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:18px;padding:8px 14px;font-size:12px;font-family:'Raleway',sans-serif;color:var(--text-bright);outline:none;transition:border-color .2s;}
.ai-input::placeholder{color:var(--text-dim);}
.ai-input:focus{border-color:rgba(64,145,108,.5);}
.ai-send{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green-500),var(--teal-600));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ai-send:hover{transform:scale(1.08);box-shadow:0 0 14px rgba(64,145,108,.5);}
.ai-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.typing{display:flex;gap:4px;align-items:center;}
.typing-dot{width:5px;height:5px;background:var(--green-300);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}
.ai-settings-panel{padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
.personality-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px;}
.persona-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:6px 7px;font-size:10px;font-family:'Raleway',sans-serif;color:var(--text-mid);cursor:pointer;transition:all .2s;text-align:center;line-height:1.35;}
.persona-btn:hover{background:rgba(100,220,200,.07);border-color:rgba(100,220,200,.25);color:var(--text-bright);}
.persona-btn.active{background:rgba(64,145,108,.2);border-color:rgba(64,145,108,.5);color:var(--green-300);}
.model-select{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:10px;font-family:'Raleway',sans-serif;color:var(--text-mid);outline:none;cursor:pointer;}
.model-select option{background:#0a1a28;}
.bp-chart-wrap{padding:1rem 1.25rem 1.25rem;}
.bp-canvas-container{position:relative;width:100%;height:200px;}
canvas.bp-canvas{width:100%;height:100%;display:block;}
.bp-legend{display:flex;gap:14px;margin-top:.75rem;flex-wrap:wrap;}
.bp-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim);}
.bp-legend-dot{width:8px;height:8px;border-radius:50%;}
.bp-avg-row{display:flex;gap:20px;padding:.75rem 1.25rem;border-top:1px solid var(--border);flex-wrap:wrap;}
.bp-avg-item{display:flex;flex-direction:column;}
.bp-avg-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.bp-avg-val{font-size:20px;font-weight:300;color:var(--text-bright);}
.bp-avg-tag{font-size:9px;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:2px;}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(5,14,24,.88);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-card{background:var(--surface-1);border:1px solid var(--border-glow);border-radius:var(--radius-lg);padding:1.75rem;width:480px;max-width:100%;position:relative;animation:modalIn .3s ease;margin:auto;}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--text-bright);margin-bottom:1.25rem;}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;}
.form-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-family:'Raleway',sans-serif;color:var(--text-bright);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:rgba(64,145,108,.5);}
.form-select{width:100%;background:rgba(5,14,24,.9);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-family:'Raleway',sans-serif;color:var(--text-bright);outline:none;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;font-family:'Raleway',sans-serif;color:var(--text-bright);outline:none;resize:vertical;min-height:64px;}
.form-textarea:focus{border-color:rgba(64,145,108,.5);}
.range-wrap{display:flex;align-items:center;gap:10px;}
.range-input{flex:1;-webkit-appearance:none;height:4px;background:rgba(255,255,255,.1);border-radius:2px;outline:none;}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--green-500);cursor:pointer;border:2px solid var(--green-300);}
.range-val{min-width:24px;text-align:center;font-size:13px;font-weight:500;color:var(--green-300);}
.modal-actions{display:flex;gap:9px;margin-top:1.25rem;}
.btn-save{flex:1;background:linear-gradient(135deg,var(--green-500),var(--teal-600));border:none;border-radius:9px;padding:10px;font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-save:hover{opacity:.9;transform:translateY(-1px);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-cancel{padding:10px 18px;background:transparent;border:1px solid var(--border);border-radius:9px;font-family:'Raleway',sans-serif;font-size:12px;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--border-glow);color:var(--text-mid);}
.close-modal{position:absolute;top:.875rem;right:1rem;background:transparent;border:none;color:var(--text-dim);font-size:17px;cursor:pointer;line-height:1;}
.close-modal:hover{color:var(--text-bright);}
.hq-steps{display:flex;gap:4px;margin-bottom:1rem;}
.hq-step{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.1);transition:background .3s;}
.hq-step.done{background:var(--green-500);}
.hq-step.active{background:var(--green-300);}
.hq-step-label{font-size:10px;color:var(--text-dim);margin-bottom:.875rem;}
.hq-section{display:none;}
.hq-section.active{display:block;}
.hq-checkbox-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.hq-check{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:11px;color:var(--text-mid);transition:all .2s;}
.hq-check input{accent-color:var(--green-500);}
.hq-check:hover{border-color:rgba(64,145,108,.4);color:var(--text-bright);}
.hq-summary-block{background:rgba(64,145,108,.07);border:1px solid rgba(64,145,108,.2);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.hq-summary-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-400);margin-bottom:6px;}
.hq-summary-text{font-size:12px;color:var(--text-mid);line-height:1.7;}
.training-list{display:flex;flex-direction:column;}
.training-row{display:flex;align-items:flex-start;padding:11px 1.25rem;border-bottom:1px solid rgba(70,160,180,.08);gap:12px;transition:background .15s;}
.training-row:hover{background:rgba(100,220,200,.04);}
.training-type-badge{font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;margin-top:3px;display:inline-block;}
.training-metrics{display:flex;gap:12px;flex:1;flex-wrap:wrap;}
.training-metric{display:flex;flex-direction:column;}
.training-metric-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.training-metric-val{font-size:12px;font-weight:500;color:var(--text-bright);}
.training-note{font-size:10px;color:var(--text-dim);font-style:italic;padding:0 1.25rem 10px;border-bottom:1px solid rgba(70,160,180,.08);}
.sleep-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:1rem 1.25rem;}
.sleep-day{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sleep-bar-wrap{height:60px;display:flex;flex-direction:column;justify-content:flex-end;width:100%;}
.sleep-bar-inner{width:100%;border-radius:3px 3px 0 0;opacity:.78;min-height:3px;}
.sleep-day-label{font-size:8px;color:var(--text-dim);}
.sleep-day-val{font-size:9px;color:var(--text-mid);}
.sch-entry-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-mid);padding:4px 0;border-bottom:1px solid rgba(70,160,180,.06);}
.sch-entry-row:last-child{border-bottom:none;}
.wiki-add-form{padding:1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(100,220,200,.2);border-radius:2px;}
</style>

function rebuildSelect(id, options, blank, defaultIdx) {
  const sel = document.getElementById(id); if(!sel) return;
  sel.innerHTML = '';
  if(blank) { const o=document.createElement('option'); o.value=''; o.textContent=blank; sel.appendChild(o); }
  options.forEach(opt => { const o=document.createElement('option'); o.value=opt; o.textContent=opt; sel.appendChild(o); });
  if(defaultIdx !== undefined) sel.selectedIndex = defaultIdx;
}

function rebuildCheckboxGroup(id, options) {
  const c = document.getElementById(id); if(!c) return;
  c.innerHTML = '';
  options.forEach(o => {
    const label=document.createElement('label'); label.className='hq-check';
    label.innerHTML=`<input type="checkbox"> ${o}`; c.appendChild(label);
  });
}

// API HELPERS
// ════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, credentials: 'include', headers: {'Content-Type':'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function switchLoginTab(mode) {
  loginMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  document.getElementById('auth-btn').textContent = mode==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('register-confirm-group').style.display = mode==='register' ? '' : 'none';
  document.getElementById('login-err').textContent = '';
}

async function doAuth() {
  const btn = document.getElementById('auth-btn');
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const password2 = document.getElementById('auth-password2').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Username and password are required.'; return; }
  if (loginMode === 'register') {
    if (password !== password2) { errEl.textContent = 'Passwords do not match.'; return; }
    if (password.length < 4) { errEl.textContent = 'Password must be at least 4 characters.'; return; }
  }
  btn.disabled = true;
  btn.textContent = '…';
  try {
    if (loginMode === 'register') {
      await api('POST', '/register', {username, password});
      // Auto-login after register
    }
    const data = await api('POST', '/login', {username, password});
    currentUser = {id: data.user_id, username: data.username};
    showApp();
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = loginMode==='login' ? 'Sign In' : 'Create Account';
  }
}

async function doLogout() {
  try { await api('POST', '/logout'); } catch(_) {}
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('auth-password').value = '';

  }
}

function showApp() {

function renderStatCards(entries) {
  const latest = entries[0];
  const dc=['#40916c','#52b788','#74c69d'];

    document.getElementById('stat-weight').textContent = latest.weight ?? '—';

    document.getElementById('stat-bp-sub').textContent = entries[0].date || '';

      const diff = (entries[0].weight - entries[1].weight).toFixed(1);
      const sub = document.getElementById('stat-weight-sub');
      sub.textContent = (diff > 0 ? '↑' : diff < 0 ? '↓' : '→') + ' ' + Math.abs(diff) + ' kg';
      sub.style.color = diff < 0 ? 'var(--green-300)' : diff > 0 ? '#f87171' : 'var(--text-dim)';

function renderWeightBars(entries) {
  const c = document.getElementById('weight-bars'); c.innerHTML='';
  // Last 7 entries with weight
  const data = entries.filter(e => e.weight).slice(0,7).reverse();
  if (!data.length) { c.innerHTML='<div class="empty-state" style="width:100%;">—</div>'; return; }
  const min = Math.min(...data.map(d=>d.weight))-.5;
  const max = Math.max(...data.map(d=>d.weight))+.5;
  const range = max - min;
  data.forEach((d,i) => {
    const h = Math.max(16, ((d.weight-min)/range)*100*1.3);
    const label = d.date ? d.date.slice(5) : '—';
    const col = document.createElement('div'); col.className='bar-col';
    col.innerHTML=`<span class="bar-val">${d.weight}</span><div class="bar" style="height:${h}px;animation-delay:${i*.08}s"></div><span class="bar-label">${label}</span>`;
    c.appendChild(col);
  });
}

function drawBpChart() {
  const canvas = document.getElementById('bp-canvas'); if(!canvas) return;
  const data = bpChartData;
  if (!data.length) {
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height);
    ['avg-sys','avg-dia','avg-pulse','bp-count','bp-min-sys','bp-max-sys'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='—';});
    document.getElementById('avg-sys-tag').textContent='';
    return;
  }
  const W=canvas.parentElement.clientWidth||600, H=200, dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad={l:38,r:16,t:14,b:28}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const BPmin=60,BPmax=162;
  function bpY(v){return pad.t+ch-((v-BPmin)/(BPmax-BPmin))*ch;}
  ctx.fillStyle='rgba(127,29,29,0.30)';ctx.fillRect(pad.l,bpY(BPmax),cw,bpY(140)-bpY(BPmax));
  ctx.fillStyle='rgba(120,53,15,0.28)';ctx.fillRect(pad.l,bpY(140),cw,bpY(120)-bpY(140));
  ctx.fillStyle='rgba(20,83,45,0.22)';ctx.fillRect(pad.l,bpY(120),cw,bpY(BPmin)-bpY(120));
  ctx.font='9px Raleway,sans-serif';
  ctx.fillStyle='rgba(248,113,113,.65)';ctx.fillText(lang==='sv'?'HÖGT':'HIGH',pad.l+5,bpY(BPmax)+12);
  ctx.fillStyle='rgba(245,158,11,.65)';ctx.fillText(lang==='sv'?'FÖRHÖJT':'ELEVATED',pad.l+5,bpY(140)+12);
  ctx.fillStyle='rgba(52,211,153,.6)';ctx.fillText(lang==='sv'?'NORMALT':'NORMAL',pad.l+5,bpY(120)+12);
  [70,80,90,100,110,120,130,140,150].forEach(v=>{
    const y=bpY(v);ctx.beginPath();ctx.strokeStyle='rgba(100,160,180,.12)';ctx.lineWidth=.5;ctx.setLineDash([3,4]);ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(90,138,150,.7)';ctx.font='9px Raleway,sans-serif';ctx.textAlign='right';ctx.fillText(v,pad.l-4,y+3);
  });
  ctx.textAlign='left';
  const n=data.length, xStep=cw/(Math.max(n-1,1));
  function ptX(i){return pad.l+i*xStep;}
  function drawLine(vals,color,lw){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineJoin='round';vals.forEach((v,i)=>i===0?ctx.moveTo(ptX(i),bpY(v)):ctx.lineTo(ptX(i),bpY(v)));ctx.stroke();}
  ctx.shadowColor='rgba(144,224,239,.25)';ctx.shadowBlur=5;drawLine(data.map(d=>d.sys),'#90e0ef',2);
  ctx.shadowColor='rgba(155,114,207,.2)';drawLine(data.map(d=>d.dia),'#9b72cf',1.5);ctx.shadowBlur=0;
  data.forEach((d,i)=>{
    const x=ptX(i),dc=d.sys>=140?'#ef4444':d.sys>=120?'#f59e0b':'#10b981';
    ctx.beginPath();ctx.arc(x,bpY(d.sys),4.5,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill();ctx.strokeStyle='rgba(5,14,24,.8)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(x,bpY(d.dia),3.5,0,Math.PI*2);ctx.fillStyle='#9b72cf';ctx.fill();ctx.strokeStyle='rgba(5,14,24,.8)';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.font='9px Raleway,sans-serif';ctx.fillStyle='rgba(90,138,150,.75)';ctx.textAlign='center';
  data.forEach((d,i)=>{if(i%2===0)ctx.fillText(d.date,ptX(i),H-7);});
  // Stats
  const avgSys=Math.round(data.reduce((s,d)=>s+d.sys,0)/n);
  const avgDia=Math.round(data.reduce((s,d)=>s+d.dia,0)/n);
  const validPulse=data.filter(d=>d.pulse);
  const avgPulse=validPulse.length?Math.round(validPulse.reduce((s,d)=>s+d.pulse,0)/validPulse.length):'—';
  document.getElementById('avg-sys').textContent=avgSys;
  document.getElementById('avg-dia').textContent=avgDia;
  document.getElementById('avg-pulse').textContent=avgPulse;
  document.getElementById('bp-count').textContent=n;
  document.getElementById('bp-min-sys').textContent=Math.min(...data.map(d=>d.sys));
  document.getElementById('bp-max-sys').textContent=Math.max(...data.map(d=>d.sys));
  const tag=document.getElementById('avg-sys-tag');
  if(avgSys>=140){tag.textContent=t('bp.tagHigh');tag.style.cssText='background:rgba(239,68,68,.15);color:#ef4444;font-size:9px;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:2px;';}
  else if(avgSys>=120){tag.textContent=t('bp.tagElevated');tag.style.cssText='background:rgba(245,158,11,.15);color:#f59e0b;font-size:9px;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:2px;';}
  else{tag.textContent=t('bp.tagNormal');tag.style.cssText='background:rgba(16,185,129,.15);color:#10b981;font-size:9px;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:2px;';}
}

function renderTrainingStats(sessions) {
  const now=new Date(), weekAgo=new Date(now-7*86400000);
  const thisWeek=sessions.filter(s=>s.date&&new Date(s.date)>=weekAgo);
  const totalMins=thisWeek.reduce((a,s)=>a+(s.duration||0),0);
  const avgSteps=thisWeek.length?Math.round(thisWeek.filter(s=>s.steps&&s.steps!=='—').length?0:0):'—';
  const sleepArr=thisWeek.filter(s=>s.sleep).map(s=>s.sleep);
  const avgSleep=sleepArr.length?(sleepArr.reduce((a,v)=>a+v,0)/sleepArr.length).toFixed(1):'—';
  document.getElementById('tw-sessions').textContent=thisWeek.length;
  document.getElementById('tw-time').innerHTML=totalMins?`${Math.floor(totalMins/60)}.${String(totalMins%60).padStart(2,'0')}<span style="font-size:11px;color:var(--text-mid)"> h</span>`:'—';
  document.getElementById('tw-steps').textContent='—';
  document.getElementById('tw-sleep').innerHTML=avgSleep!=='—'?`${avgSleep}<span style="font-size:11px;color:var(--text-mid)"> h</span>`:'—';
}

function renderSleepGrid(sessions) {
  const grid=document.getElementById('sleep-grid'); grid.innerHTML='';
  const sleepSessions=sessions.filter(s=>s.sleep).slice(0,7).reverse();
  if (!sleepSessions.length) { grid.innerHTML='<div style="grid-column:1/-1;" class="empty-state">—</div>'; return; }
  const maxH=Math.max(...sleepSessions.map(s=>s.sleep));
  const dayLabels=lang==='sv'?['Mån','Tis','Ons','Tor','Fre','Lör','Sön']:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  sleepSessions.forEach((s,i)=>{
    const barH=Math.round((s.sleep/maxH)*54);
    const color=s.sleep>=7.5?'linear-gradient(180deg,#90e0ef,#0077b6)':s.sleep>=6?'linear-gradient(180deg,#fbbf24,#b45309)':'linear-gradient(180deg,#f87171,#991b1b)';
    const label=s.date?new Date(s.date).toLocaleDateString('en-SE',{weekday:'short'}).slice(0,3):(dayLabels[i]||'');
    const col=document.createElement('div'); col.className='sleep-day';
    col.innerHTML=`<div class="sleep-bar-wrap"><div class="sleep-bar-inner" style="height:${barH}px;background:${color}"></div></div><div class="sleep-day-label">${label}</div><div class="sleep-day-val">${s.sleep}h</div>`;
    grid.appendChild(col);
  });
}

function restoreHealthProfile(p) {
  if (p.smoking) document.getElementById('hq-smoking').value=p.smoking;
  if (p.alcohol) document.getElementById('hq-alcohol').value=p.alcohol;
  if (p.sleepAvg) document.getElementById('hq-sleep-avg').value=p.sleepAvg;
  if (p.activity) document.getElementById('hq-activity').value=p.activity;
  if (p.medications) document.getElementById('hq-medications').value=p.medications;
  if (p.allergies) document.getElementById('hq-allergies').value=p.allergies;
  if (p.supplements) document.getElementById('hq-supplements').value=p.supplements;
  if (p.surgeries) document.getElementById('hq-surgeries').value=p.surgeries;
  if (p.injuries) document.getElementById('hq-injuries').value=p.injuries;
  if (p.hospitalizations) document.getElementById('hq-hospitalizations').value=p.hospitalizations;
  if (p.otherDiagnoses) document.getElementById('hq-other-diagnoses').value=p.otherDiagnoses;
  if (p.diet) document.getElementById('hq-diet').value=p.diet;
  if (p.familyNotes) document.getElementById('hq-family-notes').value=p.familyNotes;
  if (p.schedule) { scheduleEntries=[...p.schedule]; renderHqSchedule(); renderGreeting([]); }
  // Checkboxes
  if (p.familyHistory) {
    document.querySelectorAll('#hq-family-checks input').forEach(cb=>{cb.checked=p.familyHistory.includes(cb.nextSibling.textContent.trim());});
  }
  if (p.diagnoses) {
    document.querySelectorAll('#hq-diag-checks input').forEach(cb=>{cb.checked=p.diagnoses.includes(cb.nextSibling.textContent.trim());});
  }
}

function renderHqSteps() {
  const el=document.getElementById('hq-steps'); el.innerHTML='';
  for(let i=1;i<=TOTAL_HQ;i++){const s=document.createElement('div');s.className='hq-step'+(i<hqStep?' done':i===hqStep?' active':'');el.appendChild(s);}
  document.getElementById('hq-progress-label').textContent=`${t('hq.step')} ${hqStep} ${t('hq.of')} ${TOTAL_HQ}`;
  document.getElementById('hq-back-btn').style.display=hqStep>1?'':'none';
  document.getElementById('hq-next-btn').textContent=hqStep===TOTAL_HQ?t('hq.save'):t('hq.continue');
}

async function hqNav(dir) {
  if(dir===1&&hqStep===TOTAL_HQ) {
    const profile=collectHealthProfile();
    try {
      await api('POST', '/healthprofile', profile);
      alert(t('hq.saved'));
    } catch(e) { alert(e.message); }
    hqStep=1; renderHqSteps();
    document.querySelectorAll('.hq-section').forEach((s,i)=>s.classList.toggle('active',i===0));
    return;
  }
  document.getElementById('hq-'+hqStep).classList.remove('active');
  hqStep=Math.max(1,Math.min(TOTAL_HQ,hqStep+dir));
  if(hqStep===TOTAL_HQ) renderHqSummary();
  document.getElementById('hq-'+hqStep).classList.add('active');
  renderHqSteps();
}

// ════════════════════════════════════════════════════
// AURORA WEBGL
// ════════════════════════════════════════════════════
(function(){
  const canvas=document.getElementById('aurora-canvas');
  const gl=canvas.getContext('webgl',{alpha:true,premultipliedAlpha:false});if(!gl)return;
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;gl.viewport(0,0,canvas.width,canvas.height);}
  resize();window.addEventListener('resize',resize);
  const vs=`attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}`;
  const fs=`precision highp float;uniform float u_time;uniform vec2 u_res;
  float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+19.19);return fract(p.x*p.y);}
  float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
  float fbm(vec2 p){float v=0.0,amp=0.5,freq=1.0;for(int i=0;i<6;i++){v+=amp*noise(p*freq);amp*=0.5;freq*=2.1;}return v;}
  vec3 curtain(vec2 uv,float t,float baseY,float speed,float xShift,float thickness,vec3 cTop,vec3 cBot){
    float wx=uv.x+xShift+fbm(vec2(uv.x*.6,t*speed*.18))*.35;
